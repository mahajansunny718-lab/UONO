<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    height: 100vh;
    background: linear-gradient(180deg, #4a3aff, #2c2c94);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.container {
    width: 100%;
    max-width: 350px;
    text-align: center;
}

/* LOGO */
.logo {
    display: flex;
    justify-content: center;
    margin-bottom: 30px;
    cursor: pointer;
}

.logo img {
    width: 110px;
    height: 110px;
    border-radius: 20px;
    object-fit: cover;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* INPUTS */
.input-box {
    display: flex;
    align-items: center;
    background: #eaeaea;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 15px;
    color: black;
}

.input-box span {
    margin-right: 8px;
}

.input-box input {
    border: none;
    outline: none;
    background: transparent;
    width: 100%;
}

/* REMEMBER */
.remember {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
    font-size: 14px;
}

.remember input {
    margin-right: 8px;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 14px;
    background: #1c1c6b;
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 16px;
}

/* LINKS */
.links {
    margin-top: 15px;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
}

.links a {
    color: #ddd;
    text-decoration: none;
}

/* VERSION */
.version {
    position: fixed;
    bottom: 10px;
    right: 15px;
    font-size: 12px;
    color: #ccc;
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo" onclick="pickImage()">
        <img id="logoPreview" src="UONO.png.jpeg">
        <input type="file" id="logoInput" accept="image/*" hidden>
    </div>

    <!-- PHONE -->
    <div class="input-box">
        <span>+91</span>
        <input type="text" placeholder="Enter your phone number">
    </div>

    <!-- PASSWORD -->
    <div class="input-box">
        <input type="password" placeholder="Enter password">
    </div>

    <!-- REMEMBER -->
    <div class="remember">
        <input type="checkbox" checked>
        <label>Remember password</label>
    </div>

    <!-- BUTTON -->
    <button class="btn" onclick="login()">Login</button>

    <!-- LINKS -->
    <div class="links">
        <a href="#">Forgot password</a>
        <a href="#">Register</a>
    </div>

</div>

<div class="version">Version: 2.0.0.4.92</div>

<script>
function pickImage() {
    document.getElementById("logoInput").click();
}

document.getElementById("logoInput").addEventListener("change", function(e) {
    const file = e.target.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(event) {
        const imgData = event.target.result;
        document.getElementById("logoPreview").src = imgData;

        // Save locally
        localStorage.setItem("logo", imgData);
    };

    reader.readAsDataURL(file);
});

// Load saved logo
window.onload = function() {
    const saved = localStorage.getItem("logo");
    if (saved) {
        document.getElementById("logoPreview").src = saved;
    }
};

async function login() {
    const phone = document.querySelector("input[type='text']").value.trim();
    const password = document.querySelector("input[type='password']").value.trim();

    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ phone, password })
        });

        const data = await res.json();

        // ✅ Redirect after successful login
        if (data.success) {
            window.location.href = "https://www.uonohubsupport.com/";
        } else {
            alert(data.message);
        }

    } catch (err) {
        console.error(err);
        alert("Something went wrong");
    }
}
</script>

</body>
</html>
